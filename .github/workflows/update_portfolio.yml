name: Rebuild Portfolio Website

on:
  push:
    paths:
      - 'holdings.json'
      - 'build_portfolio.py'
      - 'index.template.html'
  schedule:
    # Run every day at 10:45 AM UTC (4:15 PM IST) - shortly after NSE market close
    - cron: '15 10 * * *'
  workflow_dispatch: # Enable manual execution

permissions:
  contents: write # Required for committing changes back

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # cache pip dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests

      - name: Compile static HTML
        run: python build_portfolio.py

      - name: Commit and push if index.html changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          # Commit only if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "Auto-compiled index.html with latest stock prices [skip ci]"
            git push
          else
            echo "No changes in index.html, skipping push."
          fi
